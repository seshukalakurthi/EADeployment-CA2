name: AKS CD
# Deploying Pods to AKS

on:
  workflow_run:
    workflows: ["ACR CI"]
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Create Namespace
        run: |
          kubectl create namespace ead-ca2 --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/mongodb/ -n ead-ca2
          kubectl apply -f k8s/backend/ -n ead-ca2
          kubectl apply -f k8s/frontend/ -n ead-ca2

      - name: Verify
        run: kubectl get all -n ead-ca2