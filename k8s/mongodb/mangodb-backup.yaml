apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-backup
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-csi
  resources:
    requests:
      storage: 5Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongodb-backup
spec:
  schedule: "0 2 * * *"
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: mongodb-backup
              image: mongo:7.0
              command:
                - /bin/sh
                - -c
                - backup_dir=/backup/$(date +%Y%m%d-%H%M%S) && mkdir -p "$backup_dir" && mongodump --host mongodb --out "$backup_dir" && find /backup -mindepth 1 -maxdepth 1 -type d -mtime +7 -exec rm -rf {} + && echo 'Backup completed successfully'
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: mongodb-backup