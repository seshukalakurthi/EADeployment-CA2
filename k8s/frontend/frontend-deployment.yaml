apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: eadeployca2receiperegistry.azurecr.io/eadca2_frontend:v2
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
        initialDelaySeconds: 30
        periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
        initialDelaySeconds: 10
        periodSeconds: 5
        ports:
        - containerPort: 3000
        env:
        - name: WEB_SERVICE_HOST
          value: backend
        - name: WEB_SERVICE_PORT
          value: "8080"
        resources:
          requests:
            cpu: "200m"
          limits:
            cpu: "500m"
