name: Docker Hub CI
# Pushing Images to Docker Hub

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Backend
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/eadca2_backend:latest ./EAD_BE_CA2

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/eadca2_backend:latest


      # Frontend
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/eadca2_frontend:latest ./EAD_FE_CA2

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/eadca2_frontend:latest
